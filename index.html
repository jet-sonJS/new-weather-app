<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="container">
        <form id="weather-form">
            <h1>Weather App</h1>
            <input type="text" id="location-input" placeholder="Search location..." autocomplete="off" name="auto-complete">
            <div id="custom-dropdown-container">
            <ul id="custom-dropdown" class="hidden">
                    <li>Option 1</li>
                    <li>Option 2</li>
                    <li>Option 3</li>
                </ul>
            </div>
            <input type="button" id="get-weather-btn" value="Get Weather">
        </form>
        <div id="results">
            <img id="weather-icon" alt="Weather Image" style="display:none;">
            <p id="weather-description"></p>
            <p id="temperature"></p>
            <p id="apparent-temperature"></p>
            <p id="mean-temperature"></p>
        </div> 
    </div>
    <script src="script.js"></script>
</body>
</html>
