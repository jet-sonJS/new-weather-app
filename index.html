<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Sample HTML -->
    <div id="container">
        <form id="weather-form">
            <h1>Weather App</h1>
            <input type="text" id="location-input" placeholder="Search location...">
            <input type="button" id="get-weather-btn" value="Get Weather">
        </form>
    </div>
    <div id="results">
        <img id="weather-icon" alt="Weather Image" style="display:none">
         <p id="weather-description"></p>
         <p id="temperature"></p>
         <p id="apparent-temperature"></p>
        </div> 
    <script src="script.js"></script>
</body>
</html>
