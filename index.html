<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="images/favicon2.png">
</head>
<body>
    <div id="container">
        <div id="weather-form">
            <h1>Weather App</h1>
            <input type="text" id="location-input" placeholder="Search location..." autocomplete="off" name="auto-complete" list="autocomplete">
            <datalist id="autocomplete"></datalist>
            <input type="button" id="get-weather-btn" value="Get Weather">
        </div><br><br>
        <div id="results">
            <img id="weather-icon" alt="Weather Image" style="display:none;">
            <p id="weather-description"></p>
            <p id="temperature"></p>
            <p id="apparent-temperature"></p>
            <p id="mean-temperature"></p>
        </div> 
    </div>
    <script src="script.js"></script>
</body>
</html>
